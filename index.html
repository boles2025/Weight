<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>رفيق العافية | تتبع صحتك اليومي</title>
    
    <!-- Bootstrap 5 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font (Tajawal + Cairo) -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path fill="rgba(255,255,255,0.03)" d="M0 0 L100 100 L0 100 Z"/><path fill="rgba(255,255,255,0.02)" d="M100 0 L0 100 L100 100 Z"/></svg>');
            background-size: cover;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }

        /* كارت الهيدر بتدرج رهيب */
        .gradient-header {
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-logo {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.5rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-logo i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .date-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* بطاقات أنيقة مع تدرجات */
        .fancy-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 22px 20px;
            margin-bottom: 20px;
            border: 2px solid rgba(255,255,255,0.6);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .fancy-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fancy-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 30px 50px -15px rgba(102, 126, 234, 0.4);
        }

        /* عنوان كل قسم */
        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #2d3748;
        }

        .card-title i {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        /* أزرار الصيام */
        .fasting-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .fasting-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            padding: 12px 5px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .fasting-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.2), transparent);
            transition: left 0.5s;
        }

        .fasting-btn:hover::before {
            left: 100%;
        }

        .fasting-btn:hover {
            transform: scale(1.05);
            border-color: #667eea;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.2);
        }

        .fasting-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            box-shadow: 0 15px 25px rgba(102, 126, 234, 0.4);
            animation: selectedPulse 1.5s infinite;
        }

        @keyframes selectedPulse {
            0%, 100% { box-shadow: 0 15px 25px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 20px 35px rgba(102, 126, 234, 0.6); }
        }

        /* حقول الإدخال */
        .input-glow {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            padding: 15px 20px;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .input-glow:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2), 0 10px 20px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        /* وقت الإفطار */
        .breakfast-box {
            background: linear-gradient(135deg, #f6e05e, #fbbf24);
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            color: #744210;
            font-weight: 700;
            font-size: 1.4rem;
            box-shadow: 0 15px 30px rgba(246, 224, 94, 0.3);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 15px 30px rgba(246, 224, 94, 0.3); }
            50% { box-shadow: 0 20px 40px rgba(246, 224, 94, 0.5); }
        }

        /* زرار الحفظ */
        .save-btn-modern {
            background: linear-gradient(135deg, #667eea, #764ba2, #667eea);
            background-size: 200% 200%;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            width: 100%;
            margin: 20px 0;
            box-shadow: 0 20px 40px -10px rgba(102, 126, 234, 0.5);
            animation: gradientShift 3s ease infinite, savePulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes savePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .save-btn-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .save-btn-modern:hover::before {
            left: 100%;
        }

        /* عناصر السجل */
        .log-card {
            background: white;
            border-radius: 30px;
            padding: 18px;
            margin-bottom: 15px;
            border: 2px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #667eea, #764ba2) border-box;
            animation: slideIn 0.5s ease-out;
            position: relative;
            transition: all 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-card:hover {
            transform: translateX(-5px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(102, 126, 234, 0.3);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .log-date-badge {
            background: linear-gradient(135deg, #f6e05e, #fbbf24);
            color: #744210;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 15px rgba(246, 224, 94, 0.2);
        }

        .log-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            border: 2px solid #e2e8f0;
            color: #4a5568;
        }

        .icon-btn.edit:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
            transform: rotate(180deg) scale(1.1);
        }

        .icon-btn.delete:hover {
            background: linear-gradient(135deg, #f56565, #ed64a6);
            border-color: transparent;
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        /* شريط التحميل */
        .loading-spinner {
            text-align: center;
            padding: 30px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* الأدوية */
        .meds-badge {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* تدرج خلفية الأقسام */
        .gradient-bg {
            background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(255,255,255,0.85));
        }

        /* تحويل الوقت لـ 12 ساعة */
        .time-12 {
            direction: ltr;
            display: inline-block;
        }

        /* تحسين الموبايل */
        @media (max-width: 576px) {
            .fasting-buttons {
                gap: 5px;
            }
            .fasting-btn {
                padding: 10px 3px;
                font-size: 1rem;
            }
            .header-content {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- الهيدر المتحرك -->
    <div class="gradient-header" data-aos="fade-down" data-aos-duration="1000">
        <div class="header-content">
            <div class="app-logo">
                <i class="fas fa-heart-pulse"></i>
                <span>رفيق العافية</span>
            </div>
            <div class="date-badge" id="currentDate">
                <i class="far fa-calendar-alt ms-2"></i>
                <span>جاري التحميل...</span>
            </div>
        </div>
    </div>

    <!-- اختيار التاريخ -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="100">
        <div class="card-title">
            <i class="fas fa-calendar-day"></i>
            <span>اختر يومك</span>
        </div>
        <input type="date" class="input-glow" id="selectedDate" value="">
    </div>

    <!-- الصيام المتقطع -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="200">
        <div class="card-title">
            <i class="fas fa-hourglass-half"></i>
            <span>نظام الصيام</span>
        </div>
        
        <div class="fasting-buttons">
            <div class="fasting-btn" data-hours="12" onclick="selectFasting(12)">12</div>
            <div class="fasting-btn" data-hours="16" onclick="selectFasting(16)">16</div>
            <div class="fasting-btn" data-hours="18" onclick="selectFasting(18)">18</div>
            <div class="fasting-btn" data-hours="20" onclick="selectFasting(20)">20</div>
        </div>
        
        <div class="row g-3">
            <div class="col-6">
                <label class="text-muted small mb-1">⏰ آخر وجبة</label>
                <input type="time" class="input-glow" id="lastMealTime" onchange="calculateBreakfast()">
            </div>
            <div class="col-6">
                <label class="text-muted small mb-1">🍽️ هتفطر الساعة</label>
                <div class="breakfast-box" id="breakfastTime">--:-- --</div>
            </div>
        </div>
    </div>

    <!-- القياسات -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="300">
        <div class="card-title">
            <i class="fas fa-weight-scale"></i>
            <span>القياسات</span>
        </div>
        
        <div class="row g-3">
            <div class="col-6">
                <label class="text-muted small mb-1">⚖️ الوزن (كجم)</label>
                <input type="number" step="0.1" class="input-glow" id="weightInput" placeholder="مثال: 75.5">
            </div>
            <div class="col-6">
                <label class="text-muted small mb-1">📏 محيط البطن (سم)</label>
                <input type="number" step="0.5" class="input-glow" id="bellyInput" placeholder="مثال: 85">
            </div>
        </div>
    </div>

    <!-- الأنشطة -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="400">
        <div class="card-title">
            <i class="fas fa-person-running"></i>
            <span>الأنشطة</span>
        </div>
        
        <div class="row g-3">
            <div class="col-4">
                <label class="text-muted small mb-1">🚶 المشي (دق)</label>
                <input type="number" class="input-glow" id="walkInput" placeholder="0">
            </div>
            <div class="col-4">
                <label class="text-muted small mb-1">🧘 البلانك (دق)</label>
                <input type="number" class="input-glow" id="plankInput" placeholder="0">
            </div>
            <div class="col-4">
                <label class="text-muted small mb-1">💧 المياه (كوب)</label>
                <input type="number" class="input-glow" id="waterInput" placeholder="0">
            </div>
        </div>
    </div>

    <!-- الأدوية -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="500">
        <div class="card-title">
            <i class="fas fa-pills"></i>
            <span>الأدوية</span>
        </div>
        
        <div class="d-flex flex-wrap align-items-center gap-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="medsCheckbox" style="transform: scale(1.2);">
                <label class="form-check-label fw-bold" for="medsCheckbox">
                    فيه أدوية اليوم؟
                </label>
            </div>
            <div class="flex-grow-1" id="medsDetails" style="display: none;">
                <input type="text" class="input-glow" id="medsNames" placeholder="اكتب أسماء الأدوية">
            </div>
        </div>
    </div>

    <!-- زر الحفظ الرهيب -->
    <button class="save-btn-modern" onclick="saveDailyData()" data-aos="zoom-in" data-aos-delay="600">
        <i class="fas fa-cloud-sun fa-2x"></i>
        <span>احفظ اليوم</span>
        <i class="fas fa-heart" style="animation: heartbeat 1.5s infinite;"></i>
    </button>

    <!-- السجل اليومي -->
    <div class="fancy-card" data-aos="fade-up" data-aos-delay="700">
        <div class="card-title">
            <i class="fas fa-history"></i>
            <span>سجل التطور اليومي</span>
        </div>
        
        <div id="historyList">
            <!-- السجل هنا -->
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p class="text-muted">جاري تحميل السجل...</p>
            </div>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<!-- AOS Animation -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    // تهيئة AOS
    AOS.init({
        duration: 1000,
        once: true
    });

    // -------------------- Firebase Config --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBfeAaczyuh6LCAXmIYKvW-Q_toNtjsTME",
        authDomain: "health-5e31b.firebaseapp.com",
        databaseURL: "https://health-5e31b-default-rtdb.firebaseio.com",
        projectId: "health-5e31b",
        storageBucket: "health-5e31b.firebasestorage.app",
        messagingSenderId: "308393570804",
        appId: "1:308393570804:web:43b17174f5107094c589a1"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -------------------- المتغيرات --------------------
    let selectedFasting = 16;
    let currentDate = new Date().toISOString().split('T')[0];
    
    // تعيين التاريخ الحالي
    document.getElementById('selectedDate').value = currentDate;
    
    // عرض التاريخ بالعربية
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDate').innerHTML = `
        <i class="far fa-calendar-alt ms-2"></i>
        ${new Date().toLocaleDateString('ar-EG', options)}
    `;

    // -------------------- دوال تحويل الوقت --------------------
    function formatTo12Hour(time24) {
        if (!time24) return '--:-- --';
        const [hours, minutes] = time24.split(':');
        const h = parseInt(hours);
        const period = h >= 12 ? 'م' : 'ص';
        const hour12 = h % 12 || 12;
        return `${hour12.toString().padStart(2, '0')}:${minutes} ${period}`;
    }

    function convert24To12(time24) {
        if (!time24) return '';
        const [hours, minutes] = time24.split(':');
        const h = parseInt(hours);
        const period = h >= 12 ? 'مساءً' : 'صباحاً';
        const hour12 = h % 12 || 12;
        return `${hour12}:${minutes} ${period}`;
    }

    // -------------------- اختيار الصيام --------------------
    function selectFasting(hours) {
        selectedFasting = hours;
        document.querySelectorAll('.fasting-btn').forEach(el => {
            el.classList.remove('selected');
            if (parseInt(el.dataset.hours) === hours) {
                el.classList.add('selected');
            }
        });
        calculateBreakfast();
    }

    // -------------------- حساب وقت الإفطار --------------------
    function calculateBreakfast() {
        const lastMeal = document.getElementById('lastMealTime').value;
        if (!lastMeal) return;
        
        const [hours, minutes] = lastMeal.split(':');
        const lastMealDate = new Date();
        lastMealDate.setHours(parseInt(hours), parseInt(minutes), 0);
        
        const breakfastDate = new Date(lastMealDate.getTime() + selectedFasting * 60 * 60 * 1000);
        const breakfastHours = breakfastDate.getHours().toString().padStart(2, '0');
        const breakfastMinutes = breakfastDate.getMinutes().toString().padStart(2, '0');
        
        const breakfastTime12 = formatTo12Hour(`${breakfastHours}:${breakfastMinutes}`);
        document.getElementById('breakfastTime').innerText = breakfastTime12;
    }

    // -------------------- إظهار/إخفاء الأدوية --------------------
    document.getElementById('medsCheckbox').addEventListener('change', function(e) {
        const details = document.getElementById('medsDetails');
        details.style.display = e.target.checked ? 'block' : 'none';
        if (e.target.checked) {
            details.style.animation = 'slideIn 0.3s ease-out';
        }
    });

    // -------------------- حفظ البيانات --------------------
    function saveDailyData() {
        const date = document.getElementById('selectedDate').value;
        const lastMeal = document.getElementById('lastMealTime').value;
        const breakfast = document.getElementById('breakfastTime').innerText;
        const weight = document.getElementById('weightInput').value;
        const belly = document.getElementById('bellyInput').value;
        const walk = document.getElementById('walkInput').value || 0;
        const plank = document.getElementById('plankInput').value || 0;
        const water = document.getElementById('waterInput').value || 0;
        const hasMeds = document.getElementById('medsCheckbox').checked;
        const medsNames = document.getElementById('medsNames').value;

        if (!lastMeal) {
            alert('الرجاء إدخال وقت آخر وجبة');
            return;
        }

        const data = {
            fasting: selectedFasting,
            lastMeal: lastMeal,
            breakfast: breakfast,
            weight: weight,
            belly: belly,
            walk: parseInt(walk),
            plank: parseInt(plank),
            water: parseInt(water),
            hasMeds: hasMeds,
            medsNames: hasMeds ? medsNames : '',
            timestamp: new Date().toISOString()
        };

        // تأثير عند الحفظ
        const btn = event.target;
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => btn.style.transform = 'scale(1)', 200);

        db.ref('dailyRecords/' + date).set(data)
            .then(() => {
                // مسح الحقول مع تأثير
                document.getElementById('walkInput').value = '';
                document.getElementById('plankInput').value = '';
                document.getElementById('waterInput').value = '';
                document.getElementById('medsCheckbox').checked = false;
                document.getElementById('medsDetails').style.display = 'none';
                document.getElementById('medsNames').value = '';
                
                loadHistory();
                
                // رسالة نجاح
                alert('✅ تم الحفظ بنجاح');
            })
            .catch(error => {
                console.error(error);
                alert('❌ حدث خطأ في الحفظ');
            });
    }

    // -------------------- تحميل السجل --------------------
    function loadHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = `
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p class="text-muted">جاري تحميل السجل...</p>
            </div>
        `;
        
        db.ref('dailyRecords').orderByKey().once('value', (snapshot) => {
            const records = snapshot.val();
            if (!records) {
                historyList.innerHTML = `
                    <div class="text-center py-5" data-aos="fade-up">
                        <i class="fas fa-cloud-sun fa-4x text-muted mb-3" style="opacity: 0.3;"></i>
                        <p class="text-muted">لا توجد بيانات بعد</p>
                    </div>
                `;
                return;
            }

            const entries = Object.entries(records).map(([date, data]) => ({ date, ...data }));
            entries.sort((a, b) => b.date.localeCompare(a.date));

            let html = '';
            let prevWeight = null;

            entries.forEach((entry, index) => {
                const weight = entry.weight ? parseFloat(entry.weight) : null;
                const belly = entry.belly || '--';
                const walk = entry.walk || 0;
                const plank = entry.plank || 0;
                const water = entry.water || 0;
                
                // حساب الفرق
                let diffHtml = '';
                if (weight && prevWeight !== null) {
                    const diff = weight - prevWeight;
                    if (Math.abs(diff) > 0.01) {
                        if (diff > 0) {
                            diffHtml = `<span style="color: #f56565; background: #fff5f5; padding: 2px 10px; border-radius: 50px; font-size: 0.85rem;">
                                <i class="fas fa-arrow-up"></i> +${diff.toFixed(1)}
                            </span>`;
                        } else {
                            diffHtml = `<span style="color: #48bb78; background: #f0fff4; padding: 2px 10px; border-radius: 50px; font-size: 0.85rem;">
                                <i class="fas fa-arrow-down"></i> ${diff.toFixed(1)}
                            </span>`;
                        }
                    }
                }

                const dateObj = new Date(entry.date + 'T12:00:00');
                const formattedDate = dateObj.toLocaleDateString('ar-EG', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric' 
                });

                html += `
                    <div class="log-card" data-aos="fade-up" data-aos-delay="${index * 100}">
                        <div class="log-header">
                            <div class="log-date-badge">
                                <i class="far fa-calendar-alt"></i>
                                ${formattedDate}
                                ${diffHtml}
                            </div>
                            <div class="log-actions">
                                <div class="icon-btn edit" onclick="editDay('${entry.date}')">
                                    <i class="fas fa-pen"></i>
                                </div>
                                <div class="icon-btn delete" onclick="deleteDay('${entry.date}')">
                                    <i class="fas fa-trash"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row g-2">
                            <div class="col-6 col-md-4">
                                <div style="background: #f7fafc; padding: 8px; border-radius: 15px; text-align: center;">
                                    <i class="fas fa-weight-scale" style="color: #667eea;"></i>
                                    <div class="small fw-bold">${weight ? weight + ' كجم' : '--'}</div>
                                </div>
                            </div>
                            <div class="col-6 col-md-4">
                                <div style="background: #f7fafc; padding: 8px; border-radius: 15px; text-align: center;">
                                    <i class="fas fa-utensils" style="color: #764ba2;"></i>
                                    <div class="small fw-bold">${belly} سم</div>
                                </div>
                            </div>
                            <div class="col-4 col-md-2">
                                <div style="background: #f7fafc; padding: 8px; border-radius: 15px; text-align: center;">
                                    <i class="fas fa-person-walking" style="color: #48bb78;"></i>
                                    <div class="small fw-bold">${walk}</div>
                                </div>
                            </div>
                            <div class="col-4 col-md-2">
                                <div style="background: #f7fafc; padding: 8px; border-radius: 15px; text-align: center;">
                                    <i class="fas fa-stopwatch" style="color: #ed64a6;"></i>
                                    <div class="small fw-bold">${plank}</div>
                                </div>
                            </div>
                            <div class="col-4 col-md-2">
                                <div style="background: #f7fafc; padding: 8px; border-radius: 15px; text-align: center;">
                                    <i class="fas fa-droplet" style="color: #4299e1;"></i>
                                    <div class="small fw-bold">${water}</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div>
                                <span class="badge" style="background: linear-gradient(135deg, #9f7aea, #b794f4); color: white;">
                                    <i class="fas fa-hourglass-half ms-1"></i> صيام ${entry.fasting}:8
                                </span>
                                <span class="badge bg-light text-dark ms-2">
                                    <i class="far fa-clock ms-1"></i> آخر وجبة: ${entry.lastMeal ? formatTo12Hour(entry.lastMeal) : '--'}
                                </span>
                            </div>
                            ${entry.hasMeds ? `
                            <div class="meds-badge">
                                <i class="fas fa-pills"></i> ${entry.medsNames || 'أدوية'}
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;

                if (weight) prevWeight = weight;
            });

            historyList.innerHTML = html;
            // تحديث AOS للعناصر الجديدة
            AOS.refresh();
        });
    }

    // -------------------- حذف يوم --------------------
    function deleteDay(date) {
        if (confirm('هل أنت متأكد من حذف هذا اليوم؟')) {
            const logCard = document.getElementById(`log-${date}`);
            if (logCard) {
                logCard.style.animation = 'slideOut 0.3s ease-out forwards';
            }
            
            db.ref('dailyRecords/' + date).remove()
                .then(() => {
                    loadHistory();
                })
                .catch(error => {
                    console.error(error);
                    alert('حدث خطأ في الحذف');
                });
        }
    }

    // -------------------- تعديل يوم --------------------
    function editDay(date) {
        db.ref('dailyRecords/' + date).once('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('selectedDate').value = date;
            selectFasting(data.fasting || 16);
            
            if (data.lastMeal) {
                document.getElementById('lastMealTime').value = data.lastMeal;
                calculateBreakfast();
            }
            
            document.getElementById('weightInput').value = data.weight || '';
            document.getElementById('bellyInput').value = data.belly || '';
            document.getElementById('walkInput').value = data.walk || '';
            document.getElementById('plankInput').value = data.plank || '';
            document.getElementById('waterInput').value = data.water || '';
            
            if (data.hasMeds) {
                document.getElementById('medsCheckbox').checked = true;
                document.getElementById('medsDetails').style.display = 'block';
                document.getElementById('medsNames').value = data.medsNames || '';
            } else {
                document.getElementById('medsCheckbox').checked = false;
                document.getElementById('medsDetails').style.display = 'none';
                document.getElementById('medsNames').value = '';
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // -------------------- تحميل أولي --------------------
    window.addEventListener('load', () => {
        loadHistory();
        selectFasting(16);
    });

    // -------------------- دوال عامة --------------------
    window.selectFasting = selectFasting;
    window.calculateBreakfast = calculateBreakfast;
    window.saveDailyData = saveDailyData;
    window.deleteDay = deleteDay;
    window.editDay = editDay;
    window.formatTo12Hour = formatTo12Hour;

</script>
</body>
</html>
