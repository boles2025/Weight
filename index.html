<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>يوميات العافية</title>
    
    <!-- Bootstrap 5 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font (Cairo -清新 ونظيف) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            padding: 16px;
        }

        /* بطاقات بولس سمير - ناعمة، بظل خفيف، وحواف دائرية */
        .card-boulos {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }

        .card-boulos:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.08);
        }

        /* الهيدر */
        .header-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0f172a;
            background: white;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* العناوين */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: #3b82f6;
            font-size: 1.2rem;
            background: #eef2ff;
            padding: 8px;
            border-radius: 14px;
        }

        /* الحقول */
        .input-boulos {
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            padding: 12px 18px;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
        }
        .input-boulos:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* خيارات الصيام */
        .fasting-option {
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
        }
        .fasting-option.selected {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        /* زرار الحفظ */
        .save-btn {
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.2s;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
        }
        .save-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.2);
        }

        /* عناصر السجل */
        .log-item {
            background: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            position: relative;
        }
        .log-item:hover {
            border-color: #3b82f6;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .log-date {
            font-weight: 700;
            color: #0f172a;
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.9rem;
        }
        .log-actions {
            display: flex;
            gap: 8px;
        }
        .log-action-btn {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            color: #64748b;
        }
        .log-action-btn:hover {
            background: #3b82f6;
            color: white;
        }
        .log-action-btn.delete:hover {
            background: #ef4444;
        }

        .log-details {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            font-size: 0.9rem;
            color: #475569;
        }
        .log-detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .log-detail-item i {
            width: 20px;
            color: #3b82f6;
        }

        /* شارات */
        .badge-med {
            background: #f1f5f9;
            color: #334155;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .badge-med.taken {
            background: #dbeafe;
            color: #1e40af;
        }

        /* تحسين الموبايل */
        @media (max-width: 576px) {
            .card-boulos { padding: 16px; }
            .log-details { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- الهيدر مع التاريخ -->
<div class="header-date">
    <div><i class="far fa-calendar-alt ms-2" style="color: #3b82f6;"></i> <span id="currentDate"></span></div>
    <i class="fas fa-heartbeat" style="color: #3b82f6; font-size: 1.3rem;"></i>
</div>

<!-- اختيار التاريخ -->
<div class="card-boulos">
    <div class="section-title">
        <i class="far fa-calendar-check"></i>
        <span>اختر اليوم</span>
    </div>
    <input type="date" class="input-boulos" id="selectedDate" value="">
</div>

<!-- الصيام المتقطع -->
<div class="card-boulos">
    <div class="section-title">
        <i class="fas fa-hourglass-half"></i>
        <span>الصيام المتقطع</span>
    </div>
    
    <div class="row g-2 mb-3">
        <div class="col-3">
            <div class="fasting-option" data-hours="12" onclick="selectFasting(12)">12</div>
        </div>
        <div class="col-3">
            <div class="fasting-option" data-hours="16" onclick="selectFasting(16)">16</div>
        </div>
        <div class="col-3">
            <div class="fasting-option" data-hours="18" onclick="selectFasting(18)">18</div>
        </div>
        <div class="col-3">
            <div class="fasting-option" data-hours="20" onclick="selectFasting(20)">20</div>
        </div>
    </div>
    
    <div class="row g-2">
        <div class="col-6">
            <label class="text-muted small mb-1">⏱️ آخر وجبة</label>
            <input type="time" class="input-boulos" id="lastMealTime" onchange="calculateBreakfast()">
        </div>
        <div class="col-6">
            <label class="text-muted small mb-1">🍽️ هتفطر الساعة</label>
            <div class="input-boulos bg-light" id="breakfastTime" style="background: #f8fafc; border: none; font-weight: 600;">--:--</div>
        </div>
    </div>
</div>

<!-- القياسات -->
<div class="card-boulos">
    <div class="section-title">
        <i class="fas fa-weight-scale"></i>
        <span>القياسات</span>
    </div>
    
    <div class="row g-3">
        <div class="col-6">
            <label class="text-muted small mb-1">الوزن (كجم)</label>
            <input type="number" step="0.1" class="input-boulos" id="weightInput" placeholder="مثال: 75.5">
        </div>
        <div class="col-6">
            <label class="text-muted small mb-1">محيط البطن (سم)</label>
            <input type="number" step="0.5" class="input-boulos" id="bellyInput" placeholder="مثال: 85">
        </div>
    </div>
</div>

<!-- الأنشطة -->
<div class="card-boulos">
    <div class="section-title">
        <i class="fas fa-person-walking"></i>
        <span>الأنشطة</span>
    </div>
    
    <div class="row g-3">
        <div class="col-4">
            <label class="text-muted small mb-1">🚶 المشي (دق)</label>
            <input type="number" class="input-boulos" id="walkInput" placeholder="دقيقة">
        </div>
        <div class="col-4">
            <label class="text-muted small mb-1">🧘 البلانك (دق)</label>
            <input type="number" class="input-boulos" id="plankInput" placeholder="دقيقة">
        </div>
        <div class="col-4">
            <label class="text-muted small mb-1">💧 المياه (كوب)</label>
            <input type="number" class="input-boulos" id="waterInput" placeholder="عدد الأكواب">
        </div>
    </div>
</div>

<!-- الأدوية -->
<div class="card-boulos">
    <div class="section-title">
        <i class="fas fa-pills"></i>
        <span>الأدوية</span>
    </div>
    
    <div class="d-flex align-items-center gap-3">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="medsCheckbox">
            <label class="form-check-label" for="medsCheckbox">
                فيه أدوية أو فيتامينات اليوم؟
            </label>
        </div>
        <div class="flex-grow-1" id="medsDetails" style="display: none;">
            <input type="text" class="input-boulos" id="medsNames" placeholder="اكتب أسماء الأدوية">
        </div>
    </div>
</div>

<!-- زر الحفظ -->
<button class="save-btn" onclick="saveDailyData()">
    <i class="fas fa-cloud-sun ms-2"></i> حفظ اليوم
</button>

<!-- السجل اليومي -->
<div class="card-boulos" style="background: rgba(255, 255, 255, 0.95);">
    <div class="section-title">
        <i class="fas fa-history"></i>
        <span>سجل التطور اليومي</span>
    </div>
    
    <div id="historyList">
        <!-- هنا يتم إضافة الأيام تلقائياً -->
        <div class="text-center text-muted py-4">جاري تحميل السجل...</div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // -------------------- إعدادات Firebase --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBfeAaczyuh6LCAXmIYKvW-Q_toNtjsTME",
        authDomain: "health-5e31b.firebaseapp.com",
        databaseURL: "https://health-5e31b-default-rtdb.firebaseio.com",
        projectId: "health-5e31b",
        storageBucket: "health-5e31b.firebasestorage.app",
        messagingSenderId: "308393570804",
        appId: "1:308393570804:web:43b17174f5107094c589a1"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -------------------- المتغيرات العامة --------------------
    let selectedFasting = 16; // الافتراضي
    let currentDate = new Date().toISOString().split('T')[0];
    document.getElementById('selectedDate').value = currentDate;
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
    });

    // -------------------- اختيار الصيام --------------------
    function selectFasting(hours) {
        selectedFasting = hours;
        document.querySelectorAll('.fasting-option').forEach(el => {
            el.classList.remove('selected');
            if (parseInt(el.dataset.hours) === hours) {
                el.classList.add('selected');
            }
        });
        calculateBreakfast();
    }

    // -------------------- حساب وقت الإفطار --------------------
    function calculateBreakfast() {
        const lastMeal = document.getElementById('lastMealTime').value;
        if (!lastMeal) return;
        
        const [hours, minutes] = lastMeal.split(':');
        const lastMealDate = new Date();
        lastMealDate.setHours(parseInt(hours), parseInt(minutes), 0);
        
        const breakfastDate = new Date(lastMealDate.getTime() + selectedFasting * 60 * 60 * 1000);
        const breakfastHours = breakfastDate.getHours().toString().padStart(2, '0');
        const breakfastMinutes = breakfastDate.getMinutes().toString().padStart(2, '0');
        
        document.getElementById('breakfastTime').innerText = `${breakfastHours}:${breakfastMinutes}`;
    }

    // -------------------- إظهار/إخفاء تفاصيل الأدوية --------------------
    document.getElementById('medsCheckbox').addEventListener('change', function(e) {
        document.getElementById('medsDetails').style.display = e.target.checked ? 'block' : 'none';
    });

    // -------------------- حفظ البيانات --------------------
    function saveDailyData() {
        const date = document.getElementById('selectedDate').value;
        const lastMeal = document.getElementById('lastMealTime').value;
        const breakfast = document.getElementById('breakfastTime').innerText;
        const weight = document.getElementById('weightInput').value;
        const belly = document.getElementById('bellyInput').value;
        const walk = document.getElementById('walkInput').value || 0;
        const plank = document.getElementById('plankInput').value || 0;
        const water = document.getElementById('waterInput').value || 0;
        const hasMeds = document.getElementById('medsCheckbox').checked;
        const medsNames = document.getElementById('medsNames').value;

        if (!lastMeal) {
            alert('الرجاء إدخال وقت آخر وجبة');
            return;
        }

        const data = {
            fasting: selectedFasting,
            lastMeal: lastMeal,
            breakfast: breakfast,
            weight: weight,
            belly: belly,
            walk: parseInt(walk),
            plank: parseInt(plank),
            water: parseInt(water),
            hasMeds: hasMeds,
            medsNames: hasMeds ? medsNames : '',
            timestamp: new Date().toISOString()
        };

        db.ref('dailyRecords/' + date).set(data)
            .then(() => {
                // مسح الحقول
                document.getElementById('walkInput').value = '';
                document.getElementById('plankInput').value = '';
                document.getElementById('waterInput').value = '';
                document.getElementById('medsCheckbox').checked = false;
                document.getElementById('medsDetails').style.display = 'none';
                document.getElementById('medsNames').value = '';
                
                loadHistory();
                alert('تم الحفظ بنجاح ✅');
            })
            .catch(error => {
                console.error(error);
                alert('حدث خطأ في الحفظ');
            });
    }

    // -------------------- تحميل السجل --------------------
    function loadHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '<div class="text-center text-muted py-4"><i class="fas fa-spinner fa-spin ms-2"></i>جاري التحميل...</div>';
        
        db.ref('dailyRecords').orderByKey().once('value', (snapshot) => {
            const records = snapshot.val();
            if (!records) {
                historyList.innerHTML = '<div class="text-center text-muted py-4">لا توجد بيانات بعد</div>';
                return;
            }

            // تحويل للترتيب (الأحدث أولاً)
            const entries = Object.entries(records).map(([date, data]) => ({ date, ...data }));
            entries.sort((a, b) => b.date.localeCompare(a.date));

            let html = '';
            let prevWeight = null;

            entries.forEach(entry => {
                const weight = entry.weight ? parseFloat(entry.weight) : null;
                const belly = entry.belly || '--';
                const walk = entry.walk || 0;
                const plank = entry.plank || 0;
                const water = entry.water || 0;
                
                // حساب الفرق في الوزن
                let diffHtml = '';
                if (weight && prevWeight !== null) {
                    const diff = weight - prevWeight;
                    if (diff > 0) {
                        diffHtml = `<span style="color: #ef4444;">▲ +${diff.toFixed(1)}</span>`;
                    } else if (diff < 0) {
                        diffHtml = `<span style="color: #10b981;">▼ ${diff.toFixed(1)}</span>`;
                    }
                }

                // تنسيق التاريخ
                const dateObj = new Date(entry.date + 'T12:00:00');
                const formattedDate = dateObj.toLocaleDateString('ar-EG', { 
                    weekday: 'short', 
                    month: 'short', 
                    day: 'numeric' 
                });

                html += `
                    <div class="log-item" id="log-${entry.date}">
                        <div class="log-header">
                            <span class="log-date">
                                <i class="far fa-calendar ms-1"></i>${formattedDate}
                                ${diffHtml ? ' ' + diffHtml : ''}
                            </span>
                            <div class="log-actions">
                                <div class="log-action-btn" onclick="editDay('${entry.date}')">
                                    <i class="fas fa-edit"></i>
                                </div>
                                <div class="log-action-btn delete" onclick="deleteDay('${entry.date}')">
                                    <i class="fas fa-trash"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div class="log-details">
                            <div class="log-detail-item"><i class="fas fa-weight-scale"></i> ${weight ? weight + ' كجم' : '--'}</div>
                            <div class="log-detail-item"><i class="fas fa-utensils"></i> بطن: ${belly} سم</div>
                            <div class="log-detail-item"><i class="fas fa-person-walking"></i> مشي: ${walk} د</div>
                            <div class="log-detail-item"><i class="fas fa-stopwatch"></i> بلانك: ${plank} د</div>
                            <div class="log-detail-item"><i class="fas fa-droplet"></i> ماء: ${water} كوب</div>
                        </div>
                        
                        ${entry.hasMeds ? `
                        <div class="mt-2">
                            <span class="badge-med ${entry.medsNames ? 'taken' : ''}">
                                <i class="fas fa-pills"></i> ${entry.medsNames || 'أدوية مسجلة'}
                            </span>
                        </div>
                        ` : ''}
                        
                        <div class="mt-2 small text-muted">
                            <span>⏱️ صيام ${entry.fasting}:8</span>
                            <span class="mx-2">|</span>
                            <span>🍽️ آخر وجبة: ${entry.lastMeal}</span>
                        </div>
                    </div>
                `;

                if (weight) prevWeight = weight;
            });

            historyList.innerHTML = html;
        });
    }

    // -------------------- حذف يوم --------------------
    function deleteDay(date) {
        if (confirm('هل أنت متأكد من حذف هذا اليوم؟')) {
            db.ref('dailyRecords/' + date).remove()
                .then(() => {
                    loadHistory();
                })
                .catch(error => {
                    console.error(error);
                    alert('حدث خطأ في الحذف');
                });
        }
    }

    // -------------------- تعديل يوم --------------------
    function editDay(date) {
        db.ref('dailyRecords/' + date).once('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // تحميل البيانات في الحقول
            document.getElementById('selectedDate').value = date;
            
            // اختيار الصيام
            selectFasting(data.fasting || 16);
            
            // وقت آخر وجبة
            if (data.lastMeal) {
                document.getElementById('lastMealTime').value = data.lastMeal;
                calculateBreakfast();
            }
            
            // القياسات
            document.getElementById('weightInput').value = data.weight || '';
            document.getElementById('bellyInput').value = data.belly || '';
            
            // الأنشطة
            document.getElementById('walkInput').value = data.walk || '';
            document.getElementById('plankInput').value = data.plank || '';
            document.getElementById('waterInput').value = data.water || '';
            
            // الأدوية
            if (data.hasMeds) {
                document.getElementById('medsCheckbox').checked = true;
                document.getElementById('medsDetails').style.display = 'block';
                document.getElementById('medsNames').value = data.medsNames || '';
            } else {
                document.getElementById('medsCheckbox').checked = false;
                document.getElementById('medsDetails').style.display = 'none';
                document.getElementById('medsNames').value = '';
            }

            // التمرير لأعلى
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // -------------------- تحميل أولي --------------------
    window.addEventListener('load', () => {
        loadHistory();
        selectFasting(16); // تحديد 16 ساعة افتراضياً
    });

    // -------------------- دوال عامة --------------------
    window.selectFasting = selectFasting;
    window.calculateBreakfast = calculateBreakfast;
    window.saveDailyData = saveDailyData;
    window.deleteDay = deleteDay;
    window.editDay = editDay;

</script>
</body>
</html>
