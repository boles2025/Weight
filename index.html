<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>رفيق العافية | سجل مصغر</title>
    
    <!-- Bootstrap 5 RTL CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e, #141b2b);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* الهيدر */
        .mini-header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            padding: 12px 18px;
            margin-bottom: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-mini {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-mini i {
            font-size: 1.5rem;
            color: #4f46e5;
        }

        .logo-mini span {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-badge-mini {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* البطاقات */
        .compact-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 16px 15px;
            margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-title-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #1e293b;
        }

        .card-title-mini i {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* أزرار الصيام */
        .fasting-mini-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .fasting-mini-btn {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 8px 0;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .fasting-mini-btn.selected {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-color: transparent;
            color: white;
        }

        /* حقول صغيرة */
        .input-mini {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 10px 15px;
            width: 100%;
            font-size: 0.95rem;
        }

        .input-mini:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* صف المشي والبلانك */
        .activities-mini-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* وقت الإفطار */
        .breakfast-mini {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 20px;
            padding: 8px;
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            color: #1e293b;
        }

        /* زرار الحفظ الصغير */
        .save-mini-btn {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            border-radius: 40px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            margin: 15px 0;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        /* ===== السجل المصغر ===== */
        .mini-history-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 12px;
            max-height: 350px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        /* عنصر السجل الواحد - صغير جداً */
        .mini-history-item {
            background: white;
            border-radius: 20px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            position: relative;
        }

        .mini-history-item:hover {
            border-color: #4f46e5;
            transform: translateX(-2px);
        }

        /* الجزء الأيمن - التاريخ */
        .mini-date-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            border-radius: 15px;
            padding: 5px 10px;
            min-width: 55px;
        }

        .mini-date-day {
            font-weight: 800;
            font-size: 1rem;
            color: #1e293b;
            line-height: 1;
        }

        .mini-date-month {
            font-size: 0.65rem;
            color: #64748b;
        }

        /* الإحصائيات المصغرة */
        .mini-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mini-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .mini-stat i {
            font-size: 0.8rem;
            color: #4f46e5;
        }

        /* فرق الوزن */
        .weight-diff-mini {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 30px;
            font-weight: 600;
        }

        .diff-up {
            background: #fee2e2;
            color: #ef4444;
        }

        .diff-down {
            background: #d1fae5;
            color: #10b981;
        }

        /* أزرار التحكم الصغيرة */
        .mini-actions {
            display: flex;
            gap: 5px;
        }

        .mini-action-btn {
            width: 28px;
            height: 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: white;
            border: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.8rem;
        }

        .mini-action-btn.edit:hover {
            background: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }

        .mini-action-btn.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
            color: white;
        }

        /* شريط التحميل */
        .loading-spinner-mini {
            text-align: center;
            padding: 20px;
        }

        .spinner-mini {
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* تحسين الموبايل */
        @media (max-width: 400px) {
            .mini-stats {
                gap: 6px;
            }
            .mini-stat {
                font-size: 0.75rem;
            }
            .mini-date-box {
                min-width: 45px;
                padding: 3px 5px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- هيدر صغير -->
    <div class="mini-header">
        <div class="logo-mini">
            <i class="fas fa-heart-pulse"></i>
            <span>رفيق العافية</span>
        </div>
        <div class="date-badge-mini" id="currentDate">
            <i class="far fa-calendar-alt ms-1"></i>
            <span>جاري</span>
        </div>
    </div>

    <!-- اختيار التاريخ -->
    <div class="compact-card">
        <div class="card-title-mini">
            <i class="fas fa-calendar-day"></i>
            <span>اختر اليوم</span>
        </div>
        <input type="date" class="input-mini" id="selectedDate" value="">
    </div>

    <!-- الصيام المتقطع -->
    <div class="compact-card">
        <div class="card-title-mini">
            <i class="fas fa-hourglass-half"></i>
            <span>نظام الصيام</span>
        </div>
        
        <div class="fasting-mini-grid">
            <div class="fasting-mini-btn" data-hours="12" onclick="selectFasting(12)">12</div>
            <div class="fasting-mini-btn" data-hours="16" onclick="selectFasting(16)">16</div>
            <div class="fasting-mini-btn" data-hours="18" onclick="selectFasting(18)">18</div>
            <div class="fasting-mini-btn" data-hours="20" onclick="selectFasting(20)">20</div>
        </div>
        
        <div class="row g-2">
            <div class="col-7">
                <label class="text-muted small mb-1">آخر وجبة</label>
                <input type="time" class="input-mini" id="lastMealTime" onchange="calculateBreakfast()">
            </div>
            <div class="col-5">
                <label class="text-muted small mb-1">الإفطار</label>
                <div class="breakfast-mini" id="breakfastTime">--:--</div>
            </div>
        </div>
    </div>

    <!-- القياسات الأساسية -->
    <div class="compact-card">
        <div class="card-title-mini">
            <i class="fas fa-weight-scale"></i>
            <span>القياسات</span>
        </div>
        
        <div class="row g-2">
            <div class="col-6">
                <input type="number" step="0.1" class="input-mini" id="weightInput" placeholder="الوزن (كجم)">
            </div>
            <div class="col-6">
                <input type="number" step="0.5" class="input-mini" id="bellyInput" placeholder="محيط البطن (سم)">
            </div>
        </div>
    </div>

    <!-- المشي والبلانك -->
    <div class="compact-card">
        <div class="card-title-mini">
            <i class="fas fa-person-running"></i>
            <span>الأنشطة (بالدقائق)</span>
        </div>
        
        <div class="activities-mini-row">
            <div>
                <label class="text-muted small mb-1">🚶 المشي</label>
                <input type="number" class="input-mini" id="walkInput" placeholder="دقيقة">
            </div>
            <div>
                <label class="text-muted small mb-1">🧘 البلانك</label>
                <input type="number" class="input-mini" id="plankInput" placeholder="دقيقة">
            </div>
        </div>
    </div>

    <!-- زر الحفظ -->
    <button class="save-mini-btn" onclick="saveDailyData()">
        <i class="fas fa-cloud-sun"></i>
        <span>حفظ اليوم</span>
        <i class="fas fa-check-circle"></i>
    </button>

    <!-- ===== السجل المصغر ===== -->
    <div class="compact-card" style="padding: 10px;">
        <div class="card-title-mini">
            <i class="fas fa-history"></i>
            <span>السجل اليومي (آخر 30 يوم)</span>
        </div>
        
        <div class="mini-history-container" id="historyList">
            <!-- السجل هنا -->
            <div class="loading-spinner-mini">
                <div class="spinner-mini"></div>
                <p class="text-muted small">جاري التحميل...</p>
            </div>
        </div>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // -------------------- Firebase Config --------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBfeAaczyuh6LCAXmIYKvW-Q_toNtjsTME",
        authDomain: "health-5e31b.firebaseapp.com",
        databaseURL: "https://health-5e31b-default-rtdb.firebaseio.com",
        projectId: "health-5e31b",
        storageBucket: "health-5e31b.firebasestorage.app",
        messagingSenderId: "308393570804",
        appId: "1:308393570804:web:43b17174f5107094c589a1"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // -------------------- المتغيرات --------------------
    let selectedFasting = 16;
    let currentDate = new Date().toISOString().split('T')[0];
    
    document.getElementById('selectedDate').value = currentDate;
    
    // عرض التاريخ
    const options = { year: 'numeric', month: 'numeric', day: 'numeric' };
    document.getElementById('currentDate').innerHTML = `
        <i class="far fa-calendar-alt ms-1"></i>
        ${new Date().toLocaleDateString('ar-EG', options)}
    `;

    // -------------------- دوال الوقت --------------------
    function formatTo12Hour(time24) {
        if (!time24) return '--:--';
        const [hours, minutes] = time24.split(':');
        const h = parseInt(hours);
        const period = h >= 12 ? 'م' : 'ص';
        const hour12 = h % 12 || 12;
        return `${hour12}:${minutes} ${period}`;
    }

    // -------------------- اختيار الصيام --------------------
    function selectFasting(hours) {
        selectedFasting = hours;
        document.querySelectorAll('.fasting-mini-btn').forEach(el => {
            el.classList.remove('selected');
            if (parseInt(el.dataset.hours) === hours) {
                el.classList.add('selected');
            }
        });
        calculateBreakfast();
    }

    // -------------------- حساب وقت الإفطار --------------------
    function calculateBreakfast() {
        const lastMeal = document.getElementById('lastMealTime').value;
        if (!lastMeal) return;
        
        const [hours, minutes] = lastMeal.split(':');
        const lastMealDate = new Date();
        lastMealDate.setHours(parseInt(hours), parseInt(minutes), 0);
        
        const breakfastDate = new Date(lastMealDate.getTime() + selectedFasting * 60 * 60 * 1000);
        const breakfastHours = breakfastDate.getHours().toString().padStart(2, '0');
        const breakfastMinutes = breakfastDate.getMinutes().toString().padStart(2, '0');
        
        document.getElementById('breakfastTime').innerText = formatTo12Hour(`${breakfastHours}:${breakfastMinutes}`);
    }

    // -------------------- حفظ البيانات --------------------
    function saveDailyData() {
        const date = document.getElementById('selectedDate').value;
        const lastMeal = document.getElementById('lastMealTime').value;
        const weight = document.getElementById('weightInput').value;
        const belly = document.getElementById('bellyInput').value;
        const walk = document.getElementById('walkInput').value || 0;
        const plank = document.getElementById('plankInput').value || 0;

        if (!lastMeal || !weight || !belly) {
            alert('الرجاء إدخال وقت آخر وجبة والوزن ومحيط البطن');
            return;
        }

        const data = {
            fasting: selectedFasting,
            lastMeal: lastMeal,
            weight: parseFloat(weight),
            belly: parseFloat(belly),
            walk: parseInt(walk),
            plank: parseInt(plank),
            timestamp: new Date().toISOString()
        };

        db.ref('dailyRecords/' + date).set(data)
            .then(() => {
                // مسح الحقول
                document.getElementById('lastMealTime').value = '';
                document.getElementById('weightInput').value = '';
                document.getElementById('bellyInput').value = '';
                document.getElementById('walkInput').value = '';
                document.getElementById('plankInput').value = '';
                document.getElementById('breakfastTime').innerText = '--:--';
                
                loadHistory();
                alert('✅ تم الحفظ');
            })
            .catch(error => {
                console.error(error);
                alert('❌ خطأ في الحفظ');
            });
    }

    // -------------------- تحميل السجل المصغر --------------------
    function loadHistory() {
        const historyList = document.getElementById('historyList');
        
        db.ref('dailyRecords').orderByKey().limitToLast(30).once('value', (snapshot) => {
            const records = snapshot.val();
            if (!records) {
                historyList.innerHTML = '<div class="text-center py-4 text-muted small">لا توجد بيانات</div>';
                return;
            }

            const entries = Object.entries(records).map(([date, data]) => ({ date, ...data }));
            entries.sort((a, b) => b.date.localeCompare(a.date));

            let html = '';
            let prevWeight = null;
            let prevBelly = null;

            entries.forEach((entry, index) => {
                const weight = entry.weight;
                const belly = entry.belly;
                
                // حساب الفرق
                let weightDiff = '';
                let bellyDiff = '';
                
                if (prevWeight !== null) {
                    const wDiff = weight - prevWeight;
                    if (wDiff > 0) weightDiff = `<span class="diff-up">▲ +${wDiff.toFixed(1)}</span>`;
                    else if (wDiff < 0) weightDiff = `<span class="diff-down">▼ ${wDiff.toFixed(1)}</span>`;
                }
                
                if (prevBelly !== null) {
                    const bDiff = belly - prevBelly;
                    if (bDiff > 0) bellyDiff = `<span class="diff-up">▲ +${bDiff.toFixed(1)}</span>`;
                    else if (bDiff < 0) bellyDiff = `<span class="diff-down">▼ ${bDiff.toFixed(1)}</span>`;
                }

                const dateObj = new Date(entry.date + 'T12:00:00');
                const day = dateObj.getDate();
                const month = dateObj.toLocaleDateString('ar-EG', { month: 'short' });

                html += `
                    <div class="mini-history-item">
                        <div class="mini-date-box">
                            <span class="mini-date-day">${day}</span>
                            <span class="mini-date-month">${month}</span>
                        </div>
                        
                        <div class="mini-stats">
                            <div class="mini-stat">
                                <i class="fas fa-weight-scale"></i>
                                <span>${weight} <small class="text-muted">كجم</small></span>
                                ${weightDiff}
                            </div>
                            <div class="mini-stat">
                                <i class="fas fa-utensils"></i>
                                <span>${belly} <small class="text-muted">سم</small></span>
                                ${bellyDiff}
                            </div>
                            <div class="mini-stat">
                                <i class="fas fa-hourglass-half"></i>
                                <span>${entry.fasting || 16}</span>
                            </div>
                            ${entry.walk ? `
                            <div class="mini-stat">
                                <i class="fas fa-person-walking"></i>
                                <span>${entry.walk}</span>
                            </div>
                            ` : ''}
                            ${entry.plank ? `
                            <div class="mini-stat">
                                <i class="fas fa-stopwatch"></i>
                                <span>${entry.plank}</span>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="mini-actions">
                            <div class="mini-action-btn edit" onclick="editDay('${entry.date}')">
                                <i class="fas fa-pen"></i>
                            </div>
                            <div class="mini-action-btn delete" onclick="deleteDay('${entry.date}')">
                                <i class="fas fa-trash"></i>
                            </div>
                        </div>
                    </div>
                `;

                prevWeight = weight;
                prevBelly = belly;
            });

            historyList.innerHTML = html;
        });
    }

    // -------------------- حذف يوم --------------------
    function deleteDay(date) {
        if (confirm('حذف هذا اليوم؟')) {
            db.ref('dailyRecords/' + date).remove()
                .then(() => loadHistory());
        }
    }

    // -------------------- تعديل يوم --------------------
    function editDay(date) {
        db.ref('dailyRecords/' + date).once('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            document.getElementById('selectedDate').value = date;
            selectFasting(data.fasting || 16);
            
            if (data.lastMeal) {
                document.getElementById('lastMealTime').value = data.lastMeal;
                calculateBreakfast();
            }
            
            document.getElementById('weightInput').value = data.weight || '';
            document.getElementById('bellyInput').value = data.belly || '';
            document.getElementById('walkInput').value = data.walk || '';
            document.getElementById('plankInput').value = data.plank || '';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // -------------------- تحميل أولي --------------------
    window.addEventListener('load', () => {
        loadHistory();
        selectFasting(16);
    });

    // -------------------- دوال عامة --------------------
    window.selectFasting = selectFasting;
    window.calculateBreakfast = calculateBreakfast;
    window.saveDailyData = saveDailyData;
    window.deleteDay = deleteDay;
    window.editDay = editDay;

</script>
</body>
</html>
